<script>
// 현재 메뉴 활성화
function setActiveMenu(menuName) {
  document.querySelectorAll('.menu-item').forEach(item => {
    item.classList.remove('active');
    if (item.dataset.menu === menuName) {
      item.classList.add('active');
      
      // 서브메뉴가 있는 경우 부모 메뉴도 확장
      const submenu = item.closest('.submenu');
      if (submenu) {
        const parentId = submenu.id.replace('submenu-', '');
        const parentMenu = document.querySelector(`[data-menu="${parentId}"]`);
        if (parentMenu) {
          parentMenu.classList.add('expanded');
          submenu.classList.add('active');
        }
      }
    }
  });
}

// 서브메뉴 토글
function toggleSubmenu(menuId, event) {
  event.preventDefault();
  const submenu = document.getElementById(`submenu-${menuId}`);
  const menuItem = event.currentTarget;
  
  submenu.classList.toggle('active');
  menuItem.classList.toggle('expanded');
}

// 모바일 메뉴 토글
function toggleMobileMenu() {
  const sidebar = document.getElementById('admin-sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  
  sidebar.classList.toggle('mobile-open');
  overlay.classList.toggle('active');
}

function closeMobileMenu() {
  const sidebar = document.getElementById('admin-sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  
  sidebar.classList.remove('mobile-open');
  overlay.classList.remove('active');
}

// 로그아웃
async function logout() {
  try {
    const response = await fetch('/api/auth/logout', { method: 'POST' });
    const data = await response.json();
    
    if (data.ok) {
      alert('로그아웃되었습니다.');
      location.href = '/login';
    }
  } catch (error) {
    console.error('로그아웃 실패:', error);
  }
}

// 관리자 권한 확인
async function checkAuth() {
  try {
    const response = await fetch('/api/auth/me');
    const data = await response.json();
    
    if (!data.ok || data.user.role !== 'admin') {
      alert('관리자 권한이 필요합니다.');
      location.href = '/login';
      return false;
    }
    return true;
  } catch (error) {
    console.error('인증 확인 실패:', error);
    location.href = '/login';
    return false;
  }
}

// 페이지 로드 시 권한 확인
checkAuth();

// 추가 스크립트
<!--ADDITIONAL_SCRIPTS-->
