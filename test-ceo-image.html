<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CEO 이미지 업로드 테스트</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .test-section {
      margin: 20px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .drag-zone {
      border: 2px dashed #ccc;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .drag-zone.drag-over {
      border-color: #16a34a;
      background-color: #f0f9ff;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      border-radius: 5px;
    }
    .success { background-color: #d4edda; color: #155724; }
    .error { background-color: #f8d7da; color: #721c24; }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }
    #preview {
      margin-top: 20px;
      max-width: 300px;
    }
    #preview img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h1>CEO 이미지 업로드 테스트</h1>
  
  <div class="test-section">
    <h2>1. 로그인</h2>
    <button onclick="login()">관리자 로그인</button>
    <div id="login-result"></div>
  </div>

  <div class="test-section">
    <h2>2. CEO 이미지 드래그앤드롭 테스트</h2>
    <div 
      class="drag-zone"
      id="drag-zone"
      ondrop="handleDrop(event)"
      ondragover="handleDragOver(event)"
      ondragleave="handleDragLeave(event)"
    >
      <p>이미지를 여기에 드래그하거나 클릭하여 선택</p>
      <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
    </div>
    <div id="preview"></div>
    <button onclick="uploadCeoImage()" id="upload-btn" style="display: none;">CEO 이미지 업로드</button>
    <div id="upload-result"></div>
  </div>

  <div class="test-section">
    <h2>3. 저장된 이미지 확인</h2>
    <button onclick="checkSavedImage()">저장된 이미지 확인</button>
    <div id="saved-image"></div>
  </div>

  <script>
    let authToken = '';
    let selectedFile = null;

    // 로그인
    async function login() {
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: 'admin',
            password: 'admin7789'
          })
        });
        
        const data = await response.json();
        if (data.ok && data.token) {
          authToken = data.token;
          localStorage.setItem('eden_token', data.token);
          showResult('login-result', '로그인 성공!', 'success');
        } else {
          showResult('login-result', '로그인 실패: ' + (data.error || '알 수 없는 오류'), 'error');
        }
      } catch (error) {
        showResult('login-result', '로그인 중 오류: ' + error.message, 'error');
      }
    }

    // 드래그 이벤트 핸들러
    document.getElementById('drag-zone').onclick = function() {
      document.getElementById('file-input').click();
    };

    function handleDragOver(event) {
      event.preventDefault();
      event.stopPropagation();
      event.currentTarget.classList.add('drag-over');
      event.dataTransfer.dropEffect = 'copy';
      return false;
    }

    function handleDragLeave(event) {
      event.preventDefault();
      event.stopPropagation();
      event.currentTarget.classList.remove('drag-over');
    }

    function handleDrop(event) {
      event.preventDefault();
      event.stopPropagation();
      event.currentTarget.classList.remove('drag-over');
      
      const files = event.dataTransfer.files;
      if (files.length > 0) {
        processFile(files[0]);
      }
      return false;
    }

    function handleFileSelect(event) {
      if (event.target.files.length > 0) {
        processFile(event.target.files[0]);
      }
    }

    function processFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('이미지 파일만 선택할 수 있습니다.');
        return;
      }

      selectedFile = file;
      
      // 미리보기
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('preview').innerHTML = 
          '<h3>선택된 이미지:</h3><img src="' + e.target.result + '">';
        document.getElementById('upload-btn').style.display = 'inline-block';
      };
      reader.readAsDataURL(file);
    }

    // CEO 이미지 업로드
    async function uploadCeoImage() {
      if (!authToken) {
        showResult('upload-result', '먼저 로그인하세요.', 'error');
        return;
      }

      if (!selectedFile) {
        showResult('upload-result', '이미지를 선택하세요.', 'error');
        return;
      }

      try {
        // 파일을 base64로 변환
        const reader = new FileReader();
        reader.onload = async function(e) {
          const base64Data = e.target.result;
          
          // API 호출
          const response = await fetch('/api/about/content', {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + authToken
            },
            body: JSON.stringify({
              ceo_message_image: base64Data
            })
          });

          const data = await response.json();
          
          if (data.ok) {
            showResult('upload-result', 
              'CEO 이미지 업로드 성공! 경로: ' + (data.imagePath || '알 수 없음'), 
              'success'
            );
          } else {
            showResult('upload-result', 
              'CEO 이미지 업로드 실패: ' + (data.error || '알 수 없는 오류'), 
              'error'
            );
          }
        };
        reader.readAsDataURL(selectedFile);
      } catch (error) {
        showResult('upload-result', '업로드 중 오류: ' + error.message, 'error');
      }
    }

    // 저장된 이미지 확인
    async function checkSavedImage() {
      try {
        const response = await fetch('/api/about', {
          headers: {
            'Authorization': 'Bearer ' + (authToken || localStorage.getItem('eden_token'))
          }
        });
        
        const data = await response.json();
        
        if (data.ok && data.data) {
          const imageUrl = data.data.ceo_message_image;
          if (imageUrl) {
            document.getElementById('saved-image').innerHTML = 
              '<div class="result success">이미지 경로: ' + imageUrl + '</div>' +
              '<img src="' + imageUrl + '" style="max-width: 300px; margin-top: 10px;">';
          } else {
            showResult('saved-image', 'CEO 이미지가 설정되지 않았습니다.', 'error');
          }
        } else {
          showResult('saved-image', '데이터 조회 실패', 'error');
        }
      } catch (error) {
        showResult('saved-image', '조회 중 오류: ' + error.message, 'error');
      }
    }

    function showResult(elementId, message, type) {
      document.getElementById(elementId).innerHTML = 
        '<div class="result ' + type + '">' + message + '</div>';
    }

    // 페이지 로드 시 토큰 확인
    if (localStorage.getItem('eden_token')) {
      authToken = localStorage.getItem('eden_token');
      showResult('login-result', '기존 토큰 사용 중', 'success');
    }
  </script>
</body>
</html>
