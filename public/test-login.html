<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 테스트</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    input, button { display: block; margin: 10px 0; padding: 10px; width: 100%; }
    button { background: #16a34a; color: white; border: none; cursor: pointer; }
    .result { margin-top: 20px; padding: 20px; background: #f0f0f0; white-space: pre-wrap; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>로그인 기능 테스트</h1>
    
    <div>
      <label>아이디:</label>
      <input type="text" id="username" value="admin">
      
      <label>비밀번호:</label>
      <input type="password" id="password" value="eden2026!">
      
      <button onclick="testLogin()">로그인 테스트</button>
      <button onclick="checkAuth()">인증 상태 확인</button>
      <button onclick="goToAdmin()">관리자 페이지로 이동</button>
    </div>
    
    <div id="result" class="result"></div>
  </div>

  <script>
    async function testLogin() {
      const result = document.getElementById('result');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      result.innerHTML = '로그인 시도 중...';
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.ok) {
          localStorage.setItem('eden_token', data.token);
          localStorage.setItem('eden_user', JSON.stringify(data.user));
          
          result.className = 'result success';
          result.innerHTML = `✅ 로그인 성공!\n\n` +
            `사용자 정보:\n` +
            `- ID: ${data.user.id}\n` +
            `- 아이디: ${data.user.username}\n` +
            `- 이름: ${data.user.name}\n` +
            `- 권한: ${data.user.role}\n\n` +
            `토큰: ${data.token.substring(0, 50)}...\n\n` +
            `이제 관리자 페이지로 이동할 수 있습니다.`;
        } else {
          result.className = 'result error';
          result.innerHTML = `❌ 로그인 실패\n\n${data.message || '알 수 없는 오류'}`;
        }
      } catch (error) {
        result.className = 'result error';
        result.innerHTML = `❌ 오류 발생\n\n${error.message}`;
      }
    }
    
    async function checkAuth() {
      const result = document.getElementById('result');
      const token = localStorage.getItem('eden_token');
      
      if (!token) {
        result.className = 'result error';
        result.innerHTML = '❌ 로그인되어 있지 않습니다.';
        return;
      }
      
      try {
        const response = await fetch('/api/auth/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const data = await response.json();
        
        if (data.ok) {
          result.className = 'result success';
          result.innerHTML = `✅ 인증 유효\n\n` +
            `사용자: ${data.user.name} (${data.user.username})\n` +
            `권한: ${data.user.role}`;
        } else {
          result.className = 'result error';
          result.innerHTML = `❌ 인증 실패\n\n${data.error}`;
        }
      } catch (error) {
        result.className = 'result error';
        result.innerHTML = `❌ 오류 발생\n\n${error.message}`;
      }
    }
    
    function goToAdmin() {
      window.location.href = '/admin';
    }
  </script>
</body>
</html>
