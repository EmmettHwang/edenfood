<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>인증 API 테스트</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { margin: 10px; padding: 10px 20px; }
    pre { background: #f0f0f0; padding: 15px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>인증 API 테스트</h1>
  
  <button onclick="testAuthMe()">1. /api/auth/me 테스트</button>
  <button onclick="clearAndLogin()">2. 로그인 초기화 후 재시도</button>
  <button onclick="testDirectAuth()">3. 직접 토큰 테스트</button>
  
  <pre id="result"></pre>

  <script>
    const result = document.getElementById('result');
    
    async function testAuthMe() {
      const token = localStorage.getItem('eden_token');
      result.textContent = `토큰 확인: ${token ? '있음' : '없음'}\n\n`;
      
      if (!token) {
        result.textContent += '토큰이 없습니다. 먼저 로그인하세요.';
        return;
      }
      
      try {
        const response = await fetch('/api/auth/me', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        result.textContent += `응답 상태: ${response.status}\n`;
        const data = await response.json();
        result.textContent += `응답 내용: ${JSON.stringify(data, null, 2)}`;
      } catch (error) {
        result.textContent += `오류: ${error.message}`;
      }
    }
    
    async function clearAndLogin() {
      // 기존 토큰 삭제
      localStorage.removeItem('eden_token');
      localStorage.removeItem('eden_user');
      
      result.textContent = '기존 토큰 삭제됨. 로그인 시도...\n\n';
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: 'admin', password: 'eden2026!' })
        });
        
        const data = await response.json();
        
        if (data.ok) {
          localStorage.setItem('eden_token', data.token);
          localStorage.setItem('eden_user', JSON.stringify(data.user));
          result.textContent += '✅ 로그인 성공!\n\n';
          result.textContent += `토큰: ${data.token}\n\n`;
          result.textContent += '이제 /api/auth/me 테스트를 시도하세요.';
        } else {
          result.textContent += `❌ 로그인 실패: ${data.message}`;
        }
      } catch (error) {
        result.textContent += `❌ 오류: ${error.message}`;
      }
    }
    
    async function testDirectAuth() {
      const token = localStorage.getItem('eden_token');
      if (!token) {
        result.textContent = '토큰이 없습니다. 먼저 로그인하세요.';
        return;
      }
      
      result.textContent = `직접 curl 명령어로 테스트:\n\n`;
      result.textContent += `curl -H "Authorization: Bearer ${token}" http://localhost:3000/api/auth/me\n\n`;
      result.textContent += '위 명령어를 터미널에서 실행해보세요.';
    }
  </script>
</body>
</html>
